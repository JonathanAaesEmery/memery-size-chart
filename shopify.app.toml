# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f76a18b0c4555f491759b412d36f9e60"
name = "memery-size-chart"
application_url = "https://memery-size-chart-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_products"

[auth]
redirect_urls = [
  "https://memery-size-chart-production.up.railway.app/api/auth",
  "https://memery-size-chart-production.up.railway.app/auth/callback"
]
